<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>🛸 Bachelor Imperium IV</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛸</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <script>window.FIREBASE_CONFIG = window.FIREBASE_CONFIG || null;</script>
  <script src="firebase-config.js" defer></script>
</head>
<body class="projector-body">
  <div id="conn-badge" class="conn-badge hidden">🔌 reconnecting…</div>

  <!-- Photo album backdrop -->
  <div id="album" class="album"></div>

  <!-- Idle scoreboard -->
  <main id="scoreboard" class="screen scoreboard">
    <h1 class="game-title">🛸 BACHELOR IMPERIUM IV 🛸</h1>
    <div id="player-grid" class="player-grid"></div>
    <div class="bottom-strip">
      <div class="strip-block strip-laws">
        <span class="strip-label">🃏 CARDS IN PLAY</span>
        <div id="in-play-strip" class="laws-strip"></div>
      </div>
      <div class="strip-block strip-forbidden">
        <span class="strip-label">🚫 FORBIDDEN</span>
        <div id="forbidden-strip" class="forbidden-strip"></div>
      </div>
    </div>
  </main>

  <!-- Wheel spin overlay -->
  <div id="wheel-screen" class="screen wheel-screen hidden">
    <div class="wheel-container">
      <div class="wheel-pointer">▼</div>
      <svg id="wheel" class="wheel" viewBox="-110 -110 220 220" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer rim ring -->
        <circle cx="0" cy="0" r="105" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="2"/>
        <!-- 3 sectors (each 120°) -->
        <g class="wheel-rotor">
          <!-- PUBLIC: 0–120° (red) -->
          <path d="M 0,0 L 0,-100 A 100,100 0 0,1 86.6,50 Z" fill="#8B1A1A" data-sector="public"/>
          <!-- SECRET: 120–240° (gold) -->
          <path d="M 0,0 L 86.6,50 A 100,100 0 0,1 -86.6,50 Z" fill="#B8860B" data-sector="secret"/>
          <!-- TARGETED: 240–360° (purple) -->
          <path d="M 0,0 L -86.6,50 A 100,100 0 0,1 0,-100 Z" fill="#5B21B6" data-sector="targeted"/>

          <!-- Sector dividers -->
          <line x1="0" y1="0" x2="0" y2="-100" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
          <line x1="0" y1="0" x2="86.6" y2="50" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
          <line x1="0" y1="0" x2="-86.6" y2="50" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>

          <!-- Tick marks -->
          <g stroke="rgba(255,255,255,.25)" stroke-width=".6">
            <!-- 24 ticks every 15° -->
            <g id="wheel-ticks"></g>
          </g>

          <!-- Labels — positioned at slice midpoints along radial -->
          <!-- PUBLIC midpoint at 60°: (sin60*65, -cos60*65) = (56.3, -32.5) -->
          <text x="56.3" y="-32.5" class="wheel-label" transform="rotate(60 56.3 -32.5)">PUBLIC</text>
          <!-- SECRET midpoint at 180°: (0, 65) -->
          <text x="0" y="65" class="wheel-label" transform="rotate(180 0 65)">SECRET</text>
          <!-- TARGETED midpoint at 300°: (-56.3, -32.5) -->
          <text x="-56.3" y="-32.5" class="wheel-label" transform="rotate(-60 -56.3 -32.5)">TARGETED</text>

          <!-- Center hub -->
          <circle cx="0" cy="0" r="14" fill="#0a0e1a" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>
          <text x="0" y="4" class="wheel-hub">🛸</text>
        </g>

        <!-- Highlight overlay for winning sector (revealed after spin) -->
        <g id="wheel-glow" class="wheel-glow hidden">
          <circle cx="0" cy="0" r="105" fill="none" stroke="#fff" stroke-width="3" opacity="0">
            <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="3"/>
          </circle>
        </g>
      </svg>
    </div>
  </div>

  <!-- Card display -->
  <div id="card-screen" class="screen card-screen hidden">
    <div id="card-frame" class="card-frame">
      <img id="card-image" class="card-image" alt="">
      <div id="card-fallback" class="card-fallback hidden">
        <div class="card-header" id="card-header"></div>
        <h2 class="card-title" id="card-title"></h2>
        <p class="card-body" id="card-body"></p>
      </div>
    </div>
  </div>

  <!-- Eyes closed mode -->
  <div id="eyes-closed" class="screen eyes-closed hidden">
    <div class="eyes-banner">👁  EYES  CLOSED  👁</div>
    <div id="eyes-card" class="eyes-card"></div>
  </div>

  <!-- Door applause flash -->
  <div id="applause-flash" class="screen applause-flash hidden">
    <div class="applause-emoji">👏</div>
  </div>

  <!-- Winner -->
  <div id="winner-screen" class="screen winner-screen hidden">
    <h1 class="winner-title">🏆  GALACTIC CHAMPION  🏆</h1>
    <div id="winner-podium" class="winner-podium"></div>
    <div id="confetti" class="confetti"></div>
  </div>

  <audio id="sfx-bell" src="sounds/bell.mp3" preload="auto"></audio>
  <audio id="sfx-drumroll" src="sounds/drumroll.mp3" preload="auto"></audio>
  <audio id="sfx-applause" src="sounds/applause.mp3" preload="auto"></audio>

  <script type="module" src="js/projector.js"></script>
</body>
</html>
